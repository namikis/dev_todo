name: Respond to PR Comment

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  respond-pr:
    # PRへのコメントのみ対象（Bot コメントは除外）
    if: >-
      github.event.issue.pull_request &&
      github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Extract task ID from PR body
        id: extract
        run: |
          PR_NUMBER="${{ github.event.issue.number }}"
          BODY=$(gh pr view "$PR_NUMBER" --json body --jq '.body' 2>/dev/null || true)
          TASK_ID=$(echo "$BODY" | grep -oP 'Task:\s*\K[0-9a-f-]+' | head -1 || true)
          if [ -z "$TASK_ID" ]; then
            echo "No Task ID found in PR body, skipping"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "task_id=$TASK_ID" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "Task ID: $TASK_ID"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Get PR branch info
        if: steps.extract.outputs.found == 'true'
        id: pr_info
        run: |
          BRANCH=$(gh pr view "${{ steps.extract.outputs.pr_number }}" --json headRefName --jq '.headRefName')
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "PR branch: $BRANCH"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Checkout PR branch
        if: steps.extract.outputs.found == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr_info.outputs.branch }}
          fetch-depth: 0

      - name: Setup Node.js
        if: steps.extract.outputs.found == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        if: steps.extract.outputs.found == 'true'
        run: npm ci

      - name: Set status to running
        if: steps.extract.outputs.found == 'true'
        run: node .github/scripts/update-status.mjs "${{ steps.extract.outputs.task_id }}" running --report-url="$RUN_URL"

      - name: Fetch task details from DB
        if: steps.extract.outputs.found == 'true'
        id: task
        run: |
          TASK_ID="${{ steps.extract.outputs.task_id }}"
          TASK_JSON=$(node -e "
            const { createClient } = require('@supabase/supabase-js');
            const s = createClient(process.env.SUPABASE_URL, process.env.SUPABASE_SERVICE_KEY);
            s.from('todos').select('*').eq('id', '$TASK_ID').single().then(({data,error}) => {
              if (error) { console.error(error.message); process.exit(1); }
              console.log(JSON.stringify(data));
            });
          ")
          echo "title=$(echo "$TASK_JSON" | jq -r '.title')" >> "$GITHUB_OUTPUT"
          {
            echo "memo<<MEMO_EOF"
            echo "$TASK_JSON" | jq -r '.memo // empty'
            echo "MEMO_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "type=$(echo "$TASK_JSON" | jq -r '.type // "implement"')" >> "$GITHUB_OUTPUT"

      - name: Fetch PR conversation
        if: steps.extract.outputs.found == 'true'
        id: conversation
        run: |
          PR_NUMBER="${{ steps.extract.outputs.pr_number }}"
          CONVERSATION=$(gh pr view "$PR_NUMBER" --json title,body,comments \
            --jq '{title: .title, body: .body, comments: [.comments[] | {author: .author.login, body: .body}]}')
          echo "conversation<<CONV_EOF" >> "$GITHUB_OUTPUT"
          echo "$CONVERSATION" >> "$GITHUB_OUTPUT"
          echo "CONV_EOF" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build prompt
        if: steps.extract.outputs.found == 'true'
        id: prompt
        run: |
          TASK_ID="${{ steps.extract.outputs.task_id }}"
          TITLE="${{ steps.task.outputs.title }}"
          TYPE="${{ steps.task.outputs.type }}"
          MEMO="${{ steps.task.outputs.memo }}"
          PR_NUMBER="${{ steps.extract.outputs.pr_number }}"

          if [ "$TYPE" = "research" ]; then
            BASE_PROMPT="以下のタスクについて調査し、詳細なレポートをMarkdown形式で出力してください。"
          elif [ "$TYPE" = "implement" ]; then
            BASE_PROMPT="以下のタスクの実装を続けてください。このPRのブランチ上で作業しています。変更はコミット・pushしてください。

          ## 重要な指示
          - PRのbodyに「Task: ${TASK_ID}」を必ず保持してください
          - コミットメッセージは変更内容を簡潔に記述してください"
          else
            BASE_PROMPT="以下のタスクを実行してください。"
          fi

          cat > /tmp/pr-prompt.txt << 'PROMPT_EOF'
          ${BASE_PROMPT}

          ## 不明点がある場合
          追加の不明点がある場合は、このPR（#${PR_NUMBER}）にコメントを追加し、作業を中断してください。

          ## 作業完了時
          完了したらPRにコメントしてください。**PRのbodyに Task: ${TASK_ID} を必ず保持してください。**

          # ${TITLE}
          PROMPT_EOF

          # メモがあれば追加
          if [ -n "$MEMO" ]; then
            echo "" >> /tmp/pr-prompt.txt
            echo "$MEMO" >> /tmp/pr-prompt.txt
          fi

          # PR の会話履歴を追加
          cat >> /tmp/pr-prompt.txt << 'CONV_EOF'

          ## PRでのやり取り（#${PR_NUMBER}）
          以下はPR上でのやり取りです。ユーザーの最新コメントを踏まえて作業を再開してください。

          ${{ steps.conversation.outputs.conversation }}
          CONV_EOF

          PROMPT=$(cat /tmp/pr-prompt.txt)
          echo "prompt<<PROMPT_EOF" >> "$GITHUB_OUTPUT"
          echo "$PROMPT" >> "$GITHUB_OUTPUT"
          echo "PROMPT_EOF" >> "$GITHUB_OUTPUT"

      - name: Run Claude
        if: steps.extract.outputs.found == 'true'
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          prompt: ${{ steps.prompt.outputs.prompt }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--allowedTools Bash Read Write Edit Glob Grep WebSearch WebFetch"

      - name: Check Issue and PR status
        id: issue_check
        if: always() && steps.extract.outputs.found == 'true' && steps.claude.outcome == 'success'
        run: |
          TASK_ID="${{ steps.extract.outputs.task_id }}"
          PR_NUMBER="${{ steps.extract.outputs.pr_number }}"
          PR_URL=$(gh pr view "$PR_NUMBER" --json url --jq '.url' 2>/dev/null || true)

          # Issue を検索
          ISSUE_URL=$(gh issue list --label task-question --state open --limit 10 --json url,title \
            --jq '.[] | select(.title | contains("[Task: '"$TASK_ID"']")) | .url' 2>/dev/null | head -1 || true)

          echo "issue_url=$ISSUE_URL" >> "$GITHUB_OUTPUT"
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "status=waiting_merge" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run tests
        id: test
        if: always() && steps.extract.outputs.found == 'true' && steps.claude.outcome == 'success' && steps.task.outputs.type == 'implement'
        run: |
          echo "Running non-regression tests..."
          npm test 2>&1 | tee /tmp/test-output.txt
        continue-on-error: true

      - name: Finalize task (waiting for PR merge)
        if: always() && steps.extract.outputs.found == 'true' && steps.claude.outcome == 'success' && steps.test.outcome != 'failure'
        run: |
          ARGS=("${{ steps.extract.outputs.task_id }}" "running")
          ARGS+=("--report-url=$RUN_URL")
          ARGS+=("--pr-url=${{ steps.issue_check.outputs.pr_url }}")
          [ -n "${{ steps.issue_check.outputs.issue_url }}" ] && ARGS+=("--issue-url=${{ steps.issue_check.outputs.issue_url }}")
          ARGS+=("--result=Waiting for PR merge")
          node .github/scripts/finalize-task.mjs "${ARGS[@]}"
          echo "running" > /tmp/final-status.txt

      - name: Finalize task (test failure)
        if: always() && steps.extract.outputs.found == 'true' && steps.test.outcome == 'failure'
        run: |
          TEST_OUTPUT=$(tail -20 /tmp/test-output.txt 2>/dev/null || echo "test output unavailable")
          node .github/scripts/finalize-task.mjs "${{ steps.extract.outputs.task_id }}" error \
            --result="Tests failed after Claude's changes: $TEST_OUTPUT" \
            --report-url="$RUN_URL"
          echo "error" > /tmp/final-status.txt

      - name: Finalize task (workflow failure)
        if: failure() && steps.extract.outputs.found == 'true' && steps.claude.outcome != 'success'
        run: |
          node .github/scripts/finalize-task.mjs "${{ steps.extract.outputs.task_id }}" error \
            --result="GitHub Actions workflow failed" \
            --report-url="$RUN_URL"
          echo "error" > /tmp/final-status.txt

      - name: Send notification
        if: always() && steps.extract.outputs.found == 'true'
        continue-on-error: true
        run: |
          FINAL_STATUS=$(cat /tmp/final-status.txt 2>/dev/null || echo "unknown")
          node .github/scripts/notify.mjs "${{ steps.extract.outputs.task_id }}" "$FINAL_STATUS" \
            --title="${{ steps.task.outputs.title }}" \
            --pr-url="${{ steps.issue_check.outputs.pr_url }}" \
            --issue-url="${{ steps.issue_check.outputs.issue_url }}" \
            --report-url="$RUN_URL"
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}

name: Run Task (Claude)

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: "Supabase task ID"
        required: true
      title:
        description: "Task title"
        required: true
      memo:
        description: "Task memo / instructions"
        required: false
        default: ""
      type:
        description: "Task type (research / implement)"
        required: false
        default: "implement"

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  run-task:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      TASK_ID: ${{ inputs.task_id }}
      RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Set status to running
        run: node .github/scripts/update-status.mjs "$TASK_ID" running --report-url="$RUN_URL"

      - name: Build Claude prompt
        id: prompt
        run: |
          MEMO="${{ inputs.memo }}"
          TITLE="${{ inputs.title }}"
          TYPE="${{ inputs.type }}"
          TASK_ID="${{ inputs.task_id }}"

          ISSUE_INSTRUCTION="
          ## Issue による進捗管理（必須）
          作業を開始する前に、まず以下の手順でタスク用 Issue を作成してください：
          1. \`gh label create task-question 2>/dev/null || true\` でラベルを確認
          2. \`gh issue create\` で Issue を作成する
             - タイトル: \`[Task: ${TASK_ID}] <タスク概要>\`
             - ラベル: \`task-question\`
             - 本文に作業方針・計画を記載する
          3. 作業の進捗や成果物は Issue にコメントとして記録してください

          ## 不明点・確認事項がある場合
          実装方針や要件に不明点がある場合は、Issue に質問を記載し **それ以上の実装は行わず終了** してください。
          ユーザーが Issue にコメントで回答すると、自動的に作業が再開されます。

          ## 作業完了時
          作業が完了したら Issue を close してから終了してください。Issue が open のままだと完了になりません。"

          if [ "$TYPE" = "research" ]; then
            PROMPT="以下のタスクについて調査し、詳細なレポートをMarkdown形式で出力してください。
          ${ISSUE_INSTRUCTION}"
          elif [ "$TYPE" = "implement" ]; then
            PROMPT="以下のタスクを実装してください。ブランチを切り、変更をコミットして、PRを作成するところまで行ってください。

          ## 重要な指示
          - PRのbodyに「Task: ${TASK_ID}」を必ず含めてください
          - コミットメッセージは変更内容を簡潔に記述してください
          ${ISSUE_INSTRUCTION}"
          else
            PROMPT="以下のタスクを実行してください。
          ${ISSUE_INSTRUCTION}"
          fi

          PROMPT="${PROMPT}

          # ${TITLE}"

          if [ -n "$MEMO" ]; then
            PROMPT="${PROMPT}

          ${MEMO}"
          fi

          echo "prompt<<PROMPT_EOF" >> "$GITHUB_OUTPUT"
          echo "$PROMPT" >> "$GITHUB_OUTPUT"
          echo "PROMPT_EOF" >> "$GITHUB_OUTPUT"

      - name: Run Claude
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          prompt: ${{ steps.prompt.outputs.prompt }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--allowedTools Bash Read Write Edit Glob Grep WebSearch WebFetch"

      - name: Check Claude execution quality
        id: quality
        if: always() && steps.claude.outcome == 'success'
        run: |
          LOG_FILE="/home/runner/work/_temp/claude-execution-output.json"
          if [ -f "$LOG_FILE" ]; then
            # 最後の result 行を取得
            RESULT_LINE=$(grep '"type": "result"' -A 10 "$LOG_FILE" | head -12)
            DENIALS=$(echo "$RESULT_LINE" | grep -o '"permission_denials_count": [0-9]*' | grep -o '[0-9]*' || echo "0")
            TURNS=$(echo "$RESULT_LINE" | grep -o '"num_turns": [0-9]*' | grep -o '[0-9]*' || echo "0")
            echo "permission_denials=$DENIALS" >> "$GITHUB_OUTPUT"
            echo "num_turns=$TURNS" >> "$GITHUB_OUTPUT"
            echo "Permission denials: $DENIALS, Turns: $TURNS"
            if [ "$DENIALS" -gt 0 ]; then
              echo "warning=Claude had $DENIALS permission denials" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Claude execution output not found"
            echo "permission_denials=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect Issue status
        id: issue_check
        if: always() && steps.claude.outcome == 'success'
        run: |
          # task-question ラベルの Issue から task_id に一致するものを検索（open/closed 両方）
          OPEN_ISSUE=$(gh issue list --label task-question --state open --limit 10 --json url,title \
            --jq '.[] | select(.title | contains("[Task: '"$TASK_ID"']")) | .url' 2>/dev/null | head -1 || true)
          CLOSED_ISSUE=$(gh issue list --label task-question --state closed --limit 10 --json url,title \
            --jq '.[] | select(.title | contains("[Task: '"$TASK_ID"']")) | .url' 2>/dev/null | head -1 || true)
          ISSUE_URL="${OPEN_ISSUE:-$CLOSED_ISSUE}"

          if [ -n "$OPEN_ISSUE" ]; then
            echo "is_blocked=true" >> "$GITHUB_OUTPUT"
            echo "issue_url=$ISSUE_URL" >> "$GITHUB_OUTPUT"
            echo "Blocked: Issue still open at $OPEN_ISSUE"
          elif [ -n "$CLOSED_ISSUE" ]; then
            echo "is_blocked=false" >> "$GITHUB_OUTPUT"
            echo "issue_url=$ISSUE_URL" >> "$GITHUB_OUTPUT"
            echo "Issue closed, task can complete: $CLOSED_ISSUE"
          else
            echo "is_blocked=true" >> "$GITHUB_OUTPUT"
            echo "issue_url=" >> "$GITHUB_OUTPUT"
            echo "Warning: No Issue found for task (Claude may not have created one)"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Finalize task (blocked)
        if: always() && steps.issue_check.outputs.is_blocked == 'true'
        run: |
          ISSUE_URL="${{ steps.issue_check.outputs.issue_url }}"
          ARGS=("$TASK_ID" "blocked" "--report-url=$RUN_URL")
          if [ -n "$ISSUE_URL" ]; then
            ARGS+=("--issue-url=$ISSUE_URL")
            ARGS+=("--result=Waiting for user response on Issue")
          else
            ARGS+=("--result=No Issue created - task blocked")
          fi
          node .github/scripts/finalize-task.mjs "${ARGS[@]}"

      - name: Run tests (non-regression)
        id: test
        if: always() && steps.claude.outcome == 'success' && steps.issue_check.outputs.is_blocked != 'true' && inputs.type == 'implement'
        run: |
          echo "Running non-regression tests..."
          npm test 2>&1 | tee /tmp/test-output.txt
        continue-on-error: true

      - name: Extract PR URL
        id: pr
        if: always() && steps.claude.outcome == 'success' && steps.issue_check.outputs.is_blocked != 'true'
        run: |
          PR_URL=$(gh pr list --state all --limit 10 --json url,createdAt \
            --jq 'sort_by(.createdAt) | reverse | .[0].url' 2>/dev/null || true)
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Finalize task (success)
        if: success() && steps.issue_check.outputs.is_blocked != 'true' && (steps.test.outcome == 'success' || steps.test.outcome == 'skipped')
        run: |
          ARGS=("$TASK_ID" "done")
          PR_URL="${{ steps.pr.outputs.pr_url }}"
          ISSUE_URL="${{ steps.issue_check.outputs.issue_url }}"
          DENIALS="${{ steps.quality.outputs.permission_denials }}"
          if [ -n "$PR_URL" ]; then
            ARGS+=("--pr-url=$PR_URL")
          fi
          if [ -n "$ISSUE_URL" ]; then
            ARGS+=("--issue-url=$ISSUE_URL")
          fi
          RESULT_MSG="Completed by GitHub Actions"
          if [ "$DENIALS" -gt 0 ] 2>/dev/null; then
            RESULT_MSG="$RESULT_MSG (permission_denials: $DENIALS)"
          fi
          ARGS+=("--result=$RESULT_MSG")
          ARGS+=("--report-url=$RUN_URL")
          node .github/scripts/finalize-task.mjs "${ARGS[@]}"

      - name: Finalize task (test failure)
        if: always() && steps.issue_check.outputs.is_blocked != 'true' && steps.test.outcome == 'failure'
        run: |
          TEST_OUTPUT=$(tail -20 /tmp/test-output.txt 2>/dev/null || echo "test output unavailable")
          node .github/scripts/finalize-task.mjs "$TASK_ID" error \
            --result="Tests failed after Claude's changes: $TEST_OUTPUT" \
            --report-url="$RUN_URL"

      - name: Finalize task (workflow failure)
        if: failure() && steps.issue_check.outputs.is_blocked != 'true' && steps.test.outcome != 'failure'
        run: |
          node .github/scripts/finalize-task.mjs "$TASK_ID" error \
            --result="GitHub Actions workflow failed" \
            --report-url="$RUN_URL"

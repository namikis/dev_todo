name: Review Fix (Claude)

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  fix-review:
    if: github.event.review.state == 'changes_requested'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build fix prompt
        id: prompt
        run: |
          echo "prompt<<PROMPT_EOF" >> "$GITHUB_OUTPUT"
          echo "このPRに対してレビューで修正が要求されました。以下のレビューコメントに基づいて修正を行い、コミット・pushしてください。" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "## PR情報" >> "$GITHUB_OUTPUT"
          echo "- PR: #${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          echo "- タイトル: ${{ github.event.pull_request.title }}" >> "$GITHUB_OUTPUT"
          echo "- ブランチ: ${{ github.event.pull_request.head.ref }}" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "## レビューコメント" >> "$GITHUB_OUTPUT"
          cat <<'REVIEW_EOF' >> "$GITHUB_OUTPUT"
          ${{ github.event.review.body }}
          REVIEW_EOF
          echo "" >> "$GITHUB_OUTPUT"
          echo "## 重要" >> "$GITHUB_OUTPUT"
          echo "修正後、npm test を実行してテストが通ることを確認してください。" >> "$GITHUB_OUTPUT"
          echo "PROMPT_EOF" >> "$GITHUB_OUTPUT"

      - name: Run Claude to fix
        uses: anthropics/claude-code-action@v1
        with:
          prompt: ${{ steps.prompt.outputs.prompt }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--allowedTools Bash Read Write Edit Glob Grep WebSearch WebFetch"

      - name: Run tests (non-regression)
        run: npm test

<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Claude Code ドキュメント</title>
    <link rel="stylesheet" href="/style.css" />
    <style>
      /* ---- Layout ---- */
      .claude-wrap {
        display: grid;
        grid-template-rows: auto 1fr;
        min-height: 100vh;
      }
      .claude-header {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 14px 24px;
        border-bottom: 1px solid var(--border);
        background: color-mix(in srgb, var(--card) 90%, transparent);
        backdrop-filter: blur(8px);
        position: sticky;
        top: 0;
        z-index: 10;
        flex-wrap: wrap;
      }
      .back-link {
        color: var(--muted);
        text-decoration: none;
        font-size: 13px;
        padding: 6px 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
        white-space: nowrap;
      }
      .back-link:hover { color: var(--text); }
      .claude-header h1 {
        margin: 0;
        font-size: 1.1em;
        white-space: nowrap;
      }
      .version-badge {
        font-size: 12px;
        padding: 3px 10px;
        border: 1px solid color-mix(in srgb, var(--accent-purple) 50%, var(--border));
        border-radius: 999px;
        color: var(--accent-purple);
        font-family: ui-monospace, monospace;
        white-space: nowrap;
      }
      .claude-tabs {
        display: flex;
        gap: 4px;
        margin-left: auto;
      }
      .claude-tab {
        border: 1px solid transparent;
        background: transparent;
        color: var(--muted);
        border-radius: 8px;
        padding: 7px 16px;
        font-size: 13px;
        cursor: pointer;
        white-space: nowrap;
      }
      .claude-tab.active {
        border-color: color-mix(in srgb, var(--accent-purple) 55%, var(--border));
        background: color-mix(in srgb, var(--accent-purple) 15%, transparent);
        color: var(--accent-purple);
        font-weight: 600;
      }
      .claude-tab:not(.active):hover { color: var(--text); border-color: var(--border); }

      /* ---- Main content ---- */
      .claude-main {
        max-width: 900px;
        margin: 0 auto;
        width: 100%;
        padding: 32px 24px 80px;
      }
      .tab-panel { display: none; }
      .tab-panel.active { display: block; }

      /* ---- Diff controls ---- */
      .diff-controls {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        padding: 16px 20px;
        background: color-mix(in srgb, var(--card) 92%, transparent);
        border: 1px solid var(--border);
        border-radius: 14px;
        margin-bottom: 24px;
      }
      .diff-version-group {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .diff-version-group label {
        font-size: 13px;
        color: var(--muted);
        font-weight: 500;
      }
      .diff-version-group select {
        border-radius: 10px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text);
        padding: 8px 12px;
        font-size: 13px;
        min-width: 120px;
      }
      .diff-arrow { color: var(--muted); font-size: 18px; }
      #showDiffBtn {
        margin-left: auto;
        background: color-mix(in srgb, var(--accent-purple) 18%, transparent);
        border-color: color-mix(in srgb, var(--accent-purple) 55%, var(--border));
        color: var(--accent-purple);
      }
      #showDiffBtn:hover { background: color-mix(in srgb, var(--accent-purple) 28%, transparent); }

      /* ---- Diff result ---- */
      .diff-result {
        background: color-mix(in srgb, var(--card) 92%, transparent);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 24px 28px;
      }
      .diff-version-section {
        margin-bottom: 28px;
        padding-bottom: 28px;
        border-bottom: 1px solid var(--border);
      }
      .diff-version-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
      .diff-version-title {
        font-size: 1.1em;
        font-weight: 700;
        color: var(--accent-purple);
        margin: 0 0 12px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .diff-version-title .version-tag {
        font-size: 12px;
        padding: 2px 8px;
        border: 1px solid color-mix(in srgb, var(--accent-purple) 50%, var(--border));
        border-radius: 999px;
        font-weight: 500;
        font-family: ui-monospace, monospace;
      }
      .diff-entries { list-style: none; padding: 0; margin: 0; display: grid; gap: 6px; }
      .diff-entry {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        font-size: 13.5px;
        line-height: 1.5;
        padding: 6px 10px;
        border-radius: 8px;
      }
      .diff-entry:hover { background: color-mix(in srgb, var(--border) 40%, transparent); }
      .diff-entry-tag {
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 999px;
        font-weight: 600;
        white-space: nowrap;
        border: 1px solid;
        flex-shrink: 0;
        margin-top: 2px;
      }
      .tag-added { color: var(--ok); border-color: color-mix(in srgb, var(--ok) 50%, var(--border)); background: color-mix(in srgb, var(--ok) 10%, transparent); }
      .tag-fixed { color: var(--primary); border-color: color-mix(in srgb, var(--primary) 50%, var(--border)); background: color-mix(in srgb, var(--primary) 10%, transparent); }
      .tag-improved { color: var(--accent-amber); border-color: color-mix(in srgb, var(--accent-amber) 50%, var(--border)); background: color-mix(in srgb, var(--accent-amber) 10%, transparent); }
      .tag-other { color: var(--muted); border-color: var(--border); }

      /* ---- Loading / empty ---- */
      .state-msg {
        color: var(--muted);
        font-style: italic;
        padding: 40px 0;
        text-align: center;
      }

      /* ---- md-content overrides for this page ---- */
      .md-content { line-height: 1.75; }
      .md-content h1 { font-size: 1.5em; margin: 0 0 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
      .md-content h2 { font-size: 1.2em; margin: 36px 0 12px; color: var(--primary); padding-bottom: 6px; border-bottom: 1px dashed var(--border); }
      .md-content h3 { font-size: 1.05em; margin: 22px 0 8px; color: var(--accent-purple); }
      .md-content h4 { font-size: 0.95em; margin: 16px 0 6px; color: var(--muted); }
      .md-content p { margin: 6px 0; }
      .md-content hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
      .md-content code { background: color-mix(in srgb, var(--border) 80%, transparent); padding: 2px 6px; border-radius: 5px; font-size: 0.88em; }
      .md-content pre { background: color-mix(in srgb, var(--bg) 60%, var(--border)); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; overflow-x: auto; margin: 10px 0; }
      .md-content pre code { background: none; padding: 0; font-size: 0.85em; }
      .md-content blockquote { border-left: 3px solid var(--accent-purple); margin: 8px 0; padding: 4px 14px; color: var(--muted); font-style: italic; }
      .md-content table { border-collapse: collapse; width: 100%; margin: 12px 0; font-size: 13px; }
      .md-content th { background: color-mix(in srgb, var(--border) 60%, transparent); padding: 8px 12px; text-align: left; border: 1px solid var(--border); }
      .md-content td { padding: 7px 12px; border: 1px solid var(--border); }
      .md-content tr:nth-child(even) td { background: color-mix(in srgb, var(--border) 25%, transparent); }
      .md-content ul, .md-content ol { padding-left: 22px; margin: 6px 0; }
      .md-content li { margin: 4px 0; }
      .md-content strong { color: var(--text); }
      .md-content a { color: var(--primary); text-decoration: none; }
      .md-content a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="claude-wrap">
      <header class="claude-header">
        <a href="/" class="back-link">← TODO</a>
        <h1>Claude Code ドキュメント</h1>
        <span class="version-badge" id="versionBadge">読み込み中…</span>
        <nav class="claude-tabs">
          <button class="claude-tab active" data-tab="features">機能カタログ</button>
          <button class="claude-tab" data-tab="diff">リリース差分</button>
          <button class="claude-tab" data-tab="official">公式ドキュメント</button>
        </nav>
      </header>

      <main class="claude-main">
        <!-- 機能カタログ -->
        <div id="tab-features" class="tab-panel active">
          <div id="featuresContent" class="md-content">
            <p class="state-msg">読み込み中…</p>
          </div>
        </div>

        <!-- リリース差分 -->
        <div id="tab-diff" class="tab-panel">
          <div class="diff-controls">
            <div class="diff-version-group">
              <label>From</label>
              <select id="fromVersion"><option>読み込み中…</option></select>
            </div>
            <span class="diff-arrow">→</span>
            <div class="diff-version-group">
              <label>To</label>
              <select id="toVersion"><option>読み込み中…</option></select>
            </div>
            <button id="showDiffBtn" class="button">差分を表示</button>
          </div>
          <div id="diffResult"></div>
        </div>

        <!-- 公式ドキュメント -->
        <div id="tab-official" class="tab-panel">
          <div id="officialContent" class="md-content">
            <p class="state-msg">読み込み中…</p>
          </div>
        </div>
      </main>
    </div>

    <script type="module" src="/claude-app.js"></script>
  </body>
</html>

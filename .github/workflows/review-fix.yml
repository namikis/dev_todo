name: Review Fix (Claude)

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  fix-review:
    if: github.event.review.state == 'changes_requested'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Extract task ID from PR body
        id: extract
        run: |
          BODY=$(cat <<'BODY_EOF'
          ${{ github.event.pull_request.body }}
          BODY_EOF
          )
          TASK_ID=$(echo "$BODY" | grep -oP 'Task:\s*\K[0-9a-f-]+' | head -1 || true)
          echo "task_id=$TASK_ID" >> "$GITHUB_OUTPUT"
          echo "Task ID: ${TASK_ID:-none}"

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build fix prompt
        id: prompt
        run: |
          echo "prompt<<PROMPT_EOF" >> "$GITHUB_OUTPUT"
          echo "このPRに対してレビューで修正が要求されました。以下のレビューコメントに基づいて修正を行い、コミット・pushしてください。" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "## PR情報" >> "$GITHUB_OUTPUT"
          echo "- PR: #${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          echo "- タイトル: ${{ github.event.pull_request.title }}" >> "$GITHUB_OUTPUT"
          echo "- ブランチ: ${{ github.event.pull_request.head.ref }}" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "## レビューコメント" >> "$GITHUB_OUTPUT"
          cat <<'REVIEW_EOF' >> "$GITHUB_OUTPUT"
          ${{ github.event.review.body }}
          REVIEW_EOF
          echo "" >> "$GITHUB_OUTPUT"
          echo "## 重要" >> "$GITHUB_OUTPUT"
          echo "修正後、npm test を実行してテストが通ることを確認してください。" >> "$GITHUB_OUTPUT"
          echo "PROMPT_EOF" >> "$GITHUB_OUTPUT"

      - name: Run Claude to fix
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          prompt: ${{ steps.prompt.outputs.prompt }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--allowedTools Bash Read Write Edit Glob Grep WebSearch WebFetch"

      - name: Run tests (non-regression)
        run: npm test

      - name: Send notification
        if: always()
        continue-on-error: true
        run: |
          STATUS=${{ steps.claude.outcome == 'success' && '"review-fixed"' || '"error"' }}
          node .github/scripts/notify.mjs "${{ steps.extract.outputs.task_id }}" "$STATUS" \
            --title="${{ github.event.pull_request.title }}" \
            --pr-url="${{ github.event.pull_request.html_url }}" \
            --report-url="$RUN_URL"
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
